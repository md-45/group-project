<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Similarity Calculator</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <h1>Similarity Calculator</h1>
        <div class="upload-container">
        <label for="audio-upload" class="upload-label">
            Select an (ideally instrumental) music file:
        </label>

        <input 
            type="file" 
            id="audio-upload" 
            accept="audio/*"
        />

        <p id="file-info"></p>
    </div>
    <div id="results"></div>

    <script src="script.js"></script>
    </body>
</html>
